<svg xmlns="http://www.w3.org/2000/svg" viewBox="5 5 90 90"><title>Pulse Logo</title><style>@keyframes pulse{0%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.1)}}.pulse-logo-circle{animation:pulse 2s cubic-bezier(.4,0,.6,1) infinite;transform-origin:center}.pulse-logo-outer{fill:#2563eb}.pulse-logo-inner{fill:#fff}@media (prefers-color-scheme:dark){.pulse-logo-outer{fill:#3b82f6}.pulse-logo-inner{fill:#dbeafe}}</style><circle cx="50" cy="50" r="45" class="pulse-logo-outer"/><circle cx="50" cy="50" r="25" class="pulse-logo-inner pulse-logo-circle"/></svg>